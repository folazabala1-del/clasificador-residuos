<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificador Inteligente de Residuos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>♻️ Clasificador Inteligente de Residuos</h1>

        <p class="subtitle">
            Detección en tiempo real usando YOLO11 + ONNX Runtime
        </p>

        <p id="status" class="status">Conectando con el servidor...</p>

        <div class="camera-container">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="canvas"></canvas>
            <div id="result">Esperando detección...</div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
